name: GitHub Release

# Reusable workflow — call from any fissible project:
#
#   on:
#     push:
#       tags: ['v*']
#   jobs:
#     release:
#       uses: fissible/.github/.github/workflows/release.yml@main
#
# Requires: CHANGELOG.md with a section matching the tag version.

on:
  workflow_call:

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main \
            || { echo "Tag is not on main — release aborted."; exit 1; }

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract lines between this version's heading and the next
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' > release_notes.txt
          if [[ ! -s release_notes.txt ]]; then
            echo "No CHANGELOG entry found for ${VERSION}" > release_notes.txt
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.txt
